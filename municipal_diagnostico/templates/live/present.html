<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentar {{ session.titulo }} | Live</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="live-presentation-page">
    <section
        class="live-presenter live-presentation-shell"
        data-live-presenter
        data-session-id="{{ session.id }}"
        data-session-code="{{ session.code }}"
        data-can-control="{{ 'true' if current_user.rol == 'administrador' else 'false' }}"
    >
        <header class="live-presentation-topbar">
            <div class="live-presentation-title">
                <p class="eyebrow">Ayuntamiento de Hermosillo · Código {{ session.code }}</p>
                <h1>{{ session.titulo }}</h1>
                <p class="lede" data-live-status>{{ session.estado }}</p>
            </div>
            <div class="live-presentation-join">
                <div>
                    <small>Participa en</small>
                    <strong>{{ session.code }}</strong>
                    <code>{{ join_url }}</code>
                </div>
                <img src="{{ qr_image_url }}" alt="QR de acceso a {{ session.code }}">
            </div>
        </header>

        {% if current_user.rol == "administrador" %}
        <nav class="live-presentation-actions live-controls" aria-label="Controles de presentación">
            <button class="button button-primary" type="button" data-live-fullscreen>Pantalla completa</button>
            <button class="button" type="button" data-live-control="open_session">Abrir sesión</button>
            <button class="button danger" type="button" data-live-control="close_session">Cerrar sesión</button>
            <a class="button" href="{{ url_for('live.instructions', session_id=session.id) }}">QR</a>
            <a class="button" href="{{ url_for('live.export_session_xlsx', session_id=session.id) }}">Excel</a>
            <a class="button" href="{{ url_for('live.export_session_pdf', session_id=session.id) }}">PDF</a>
        </nav>
        {% endif %}

        <div class="live-presentation-body">
            <aside class="live-presentation-sidebar live-activity-list" data-live-activity-list></aside>
            <main class="live-presentation-main live-results-panel">
                <div class="live-presentation-question" data-live-current-activity></div>
                <div class="live-presentation-results">
                    <div class="live-chart-wrap"><canvas data-live-chart></canvas></div>
                    <div data-live-wordcloud class="live-wordcloud"></div>
                    <div data-live-results-list class="live-results-list"></div>
                </div>
            </main>
        </div>
    </section>
    <script id="live-session-state" type="application/json">{{ session_state|tojson }}</script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
    <script defer src="{{ url_for('static', filename='live.js') }}"></script>
</body>
</html>
